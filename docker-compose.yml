services:
  db:
    image: mysql:8.0
    container_name: lilmarket-db
    restart: always
    # Low-memory optimization for MySQL
    command: [
      "--performance_schema=OFF",
      "--max_connections=50",
      "--innodb_buffer_pool_size=256M"
    ]
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./src/main/resources/lilmarket.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          memory: 512M

  api:
    build: .
    image: lilmarket-api:latest
    container_name: lilmarket-api
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - DB_URL=${DB_URL}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.MySQLDialect
      # Spring Boot memory optimization
      - JAVA_OPTS=-Xmx400m -Xms200m -XX:+UseSerialGC
    deploy:
      resources:
        limits:
          memory: 600M
